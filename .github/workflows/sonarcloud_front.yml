name: SonarCloud Frontend Analysis

on:
  workflow_call:
    inputs:
      projectBaseDir:
        required: true
        type: string
      coverageReportPath:
        required: true
        type: string

jobs:
  Frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.projectBaseDir }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ inputs.projectBaseDir }}
          args: >
            -Dsonar.javascript.lcov.reportPaths=${{ inputs.coverageReportPath }}


